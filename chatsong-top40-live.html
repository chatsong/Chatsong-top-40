<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatSong Top 40</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #141419;
    --card: #1c1c24;
    --card2: #22222c;
    --accent: #ff6b00;
    --accent2: #ff9240;
    --text: #f0f0f0;
    --muted: #888;
    --border: #2a2a36;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* HEADER */
  header {
    padding: 28px 0 20px;
    text-align: center;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .flame { font-size: 26px; animation: flicker 2s infinite alternate; }

  @keyframes flicker {
    0% { transform: scale(1) rotate(-2deg); }
    100% { transform: scale(1.1) rotate(2deg); }
  }

  h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(34px, 8vw, 52px);
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .subtitle {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .live-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,107,0,0.12);
    border: 1px solid rgba(255,107,0,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--accent);
    margin-top: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .live-dot::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* SUBMIT FORM */
  .submit-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin: 20px 0;
  }

  .submit-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  input {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: #555; }

  .submit-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Bebas Neue', cursive;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .form-msg {
    font-size: 13px;
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    display: none;
  }

  .form-msg.success {
    display: block;
    background: rgba(30,215,96,0.1);
    border: 1px solid rgba(30,215,96,0.3);
    color: #1ed760;
  }

  .form-msg.error {
    display: block;
    background: rgba(255,60,60,0.1);
    border: 1px solid rgba(255,60,60,0.3);
    color: #ff6060;
  }

  /* PLATFORM HINT */
  .platform-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .ph { padding: 2px 7px; border-radius: 4px; font-weight: 600; font-size: 10px; }
  .ph-sc { background: rgba(255,85,0,0.15); color: #ff5500; }
  .ph-yt { background: rgba(255,0,0,0.15); color: #ff4444; }
  .ph-sp { background: rgba(30,215,96,0.15); color: #1ed760; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--muted);
    margin: 24px 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* LOADING */
  .loading {
    text-align: center;
    color: var(--muted);
    padding: 40px;
    font-size: 14px;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
  .empty p { font-size: 13px; line-height: 1.5; }

  /* TRACK CARD */
  .track-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .track-card:hover { border-color: rgba(255,107,0,0.25); transform: translateY(-1px); }
  .track-card.top1 { border-color: rgba(255,215,0,0.35); }
  .track-card.top2 { border-color: rgba(192,192,192,0.25); }
  .track-card.top3 { border-color: rgba(205,127,50,0.25); }

  .track-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    cursor: pointer;
  }

  /* RANK */
  .rank {
    font-family: 'Bebas Neue', cursive;
    font-size: 17px;
    min-width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .rank-1 { background: linear-gradient(135deg, #ffd700, #ff9500); color: #1a1000; }
  .rank-2 { background: linear-gradient(135deg, #c0c0c0, #888); color: #111; }
  .rank-3 { background: linear-gradient(135deg, #cd7f32, #8b4513); color: #fff; }
  .rank-other { background: var(--card2); color: var(--muted); font-size: 13px; }

  /* INFO */
  .track-info { flex: 1; min-width: 0; }

  .track-title {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-meta {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 3px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .platform-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .badge-sc { background: rgba(255,85,0,0.15); color: #ff5500; }
  .badge-yt { background: rgba(255,0,0,0.15); color: #ff4444; }
  .badge-sp { background: rgba(30,215,96,0.15); color: #1ed760; }
  .badge-other { background: rgba(255,255,255,0.08); color: #aaa; }

  /* VOTE */
  .vote-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 11px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    flex-shrink: 0;
    min-width: 48px;
  }

  .vote-btn:hover:not(.voted) {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255,107,0,0.08);
  }

  .vote-btn.voted {
    border-color: var(--accent);
    background: rgba(255,107,0,0.15);
    color: var(--accent);
  }

  .vote-arrow { font-size: 15px; line-height: 1; }
  .vote-count { font-size: 13px; font-weight: 700; font-family: 'Bebas Neue', cursive; letter-spacing: 1px; }

  /* CHEVRON */
  .chevron {
    color: var(--muted);
    font-size: 16px;
    transition: transform 0.3s;
    flex-shrink: 0;
  }

  .track-card.open .chevron { transform: rotate(180deg); }

  /* PLAYER */
  .player-wrap {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    background: #0f0f14;
  }

  .track-card.open .player-wrap { max-height: 200px; }

  .player-wrap iframe {
    width: 100%;
    border: none;
    display: block;
  }

  .player-error {
    padding: 16px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }

  .player-error a {
    color: var(--accent);
    text-decoration: none;
  }

  /* FOOTER */
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    letter-spacing: 1px;
  }

  footer span { color: var(--accent); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-line">
      <span class="flame">🔥</span>
      <h1>ChatSong Top 40</h1>
      <span class="flame">🔥</span>
    </div>
    <p class="subtitle">Indie Music Chart — Community Powered</p>
    <div class="live-dot">Live Voting</div>
  </header>

  <!-- SUBMIT FORM -->
  <div class="submit-card">
    <div class="submit-title">🎵 Submit Your Track</div>
    <div class="form-row">
      <div class="form-group">
        <label>Artist Name</label>
        <input type="text" id="inp-artist" placeholder="Jouw naam..." maxlength="60">
      </div>
      <div class="form-group">
        <label>Track Title</label>
        <input type="text" id="inp-title" placeholder="Naam van je track..." maxlength="80">
      </div>
    </div>
    <div class="form-group full" style="margin-bottom:10px">
      <label>Music Link</label>
      <input type="url" id="inp-url" placeholder="https://soundcloud.com/... of youtube.com/... of spotify.com/...">
      <div class="platform-hint">
        <span class="ph ph-sc">☁ SoundCloud</span>
        <span class="ph ph-yt">▶ YouTube</span>
        <span class="ph ph-sp">♪ Spotify</span>
      </div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitTrack()">🚀 SUBMIT TRACK</button>
    <div class="form-msg" id="form-msg"></div>
  </div>

  <div class="section-title">🔥 Current Standings</div>

  <div id="chart">
    <div class="loading">
      <div class="spinner"></div>
      Laden...
    </div>
  </div>

  <footer>
    <p>ChatSong Top 40 · <span>community.chatsong.nl</span></p>
    <p style="margin-top:6px">Support indie music 🎵</p>
  </footer>
</div>

<script>
const DB_URL = 'https://chatsong-chart-top-40-default-rtdb.europe-west1.firebasedatabase.app';
let tracks = {};
let openId = null;
let myVotes = JSON.parse(localStorage.getItem('cs40_votes') || '{}');
let myTracks = JSON.parse(localStorage.getItem('cs40_mytracks') || '[]');

// ── PLATFORM DETECTION ──────────────────────────────────────
function detectPlatform(url) {
  if (!url) return 'other';
  const u = url.toLowerCase();
  if (u.includes('soundcloud.com')) return 'soundcloud';
  if (u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
  if (u.includes('spotify.com')) return 'spotify';
  return 'other';
}

function getEmbedUrl(url, platform) {
  try {
    if (platform === 'youtube') {
      let videoId = '';
      if (url.includes('youtu.be/')) {
        videoId = url.split('youtu.be/')[1].split('?')[0];
      } else if (url.includes('v=')) {
        videoId = url.split('v=')[1].split('&')[0];
      }
      return videoId ? `https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1` : null;
    }
    if (platform === 'spotify') {
      // track, album, playlist, episode
      const match = url.match(/spotify\.com\/(track|album|playlist|episode)\/([a-zA-Z0-9]+)/);
      if (match) return `https://open.spotify.com/embed/${match[1]}/${match[2]}?utm_source=generator&theme=0`;
      return null;
    }
    if (platform === 'soundcloud') {
      return `https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23ff6b00&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&visual=false`;
    }
  } catch(e) {}
  return null;
}

function getPlayerHeight(platform) {
  if (platform === 'youtube') return 180;
  if (platform === 'spotify') return 152;
  return 166;
}

function getPlatformBadge(platform) {
  const map = {
    soundcloud: `<span class="platform-badge badge-sc">☁ SoundCloud</span>`,
    youtube: `<span class="platform-badge badge-yt">▶ YouTube</span>`,
    spotify: `<span class="platform-badge badge-sp">♪ Spotify</span>`,
    other: `<span class="platform-badge badge-other">♫ Music</span>`
  };
  return map[platform] || map.other;
}

// ── FIREBASE HELPERS ─────────────────────────────────────────
async function fbGet(path) {
  const res = await fetch(`${DB_URL}/${path}.json`);
  return res.json();
}

async function fbSet(path, data) {
  await fetch(`${DB_URL}/${path}.json`, {
    method: 'PUT',
    body: JSON.stringify(data)
  });
}

async function fbPush(path, data) {
  const res = await fetch(`${DB_URL}/${path}.json`, {
    method: 'POST',
    body: JSON.stringify(data)
  });
  return res.json();
}

async function fbUpdate(path, data) {
  await fetch(`${DB_URL}/${path}.json`, {
    method: 'PATCH',
    body: JSON.stringify(data)
  });
}

// ── LOAD & RENDER ─────────────────────────────────────────────
async function loadTracks() {
  try {
    const data = await fbGet('tracks');
    tracks = data || {};
    renderChart();
  } catch(e) {
    document.getElementById('chart').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <h3>Verbinding mislukt</h3>
        <p>Controleer je internetverbinding</p>
      </div>`;
  }
}

function renderChart() {
  const chart = document.getElementById('chart');
  const sorted = Object.entries(tracks)
    .map(([id, t]) => ({id, ...t}))
    .sort((a,b) => (b.votes||0) - (a.votes||0));

  if (sorted.length === 0) {
    chart.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🎵</div>
        <h3>Nog geen tracks!</h3>
        <p>Wees de eerste die een track submit.<br>Deel je muziek met de ChatSong community.</p>
      </div>`;
    return;
  }

  chart.innerHTML = sorted.map((track, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? `top${rank}` : '';
    const rankBadge = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
    const isOpen = openId === track.id;
    const hasVoted = myVotes[track.id];
    const platform = track.platform || detectPlatform(track.url);
    const embedUrl = getEmbedUrl(track.url, platform);
    const h = getPlayerHeight(platform);

    const playerContent = isOpen
      ? (embedUrl
          ? `<iframe src="${embedUrl}" height="${h}" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture" allowfullscreen scrolling="no"></iframe>`
          : `<div class="player-error">Player niet beschikbaar · <a href="${track.url}" target="_blank">Open op platform ↗</a></div>`)
      : '';

    return `
      <div class="track-card ${rankClass} ${isOpen ? 'open' : ''}" id="card-${track.id}">
        <div class="track-header" onclick="togglePlayer('${track.id}')">
          <div class="rank ${rankBadge}">#${rank}</div>
          <div class="track-info">
            <div class="track-title">${escHtml(track.title)}</div>
            <div class="track-meta">
              <span>${escHtml(track.artist)}</span>
              <span>·</span>
              ${getPlatformBadge(platform)}
            </div>
          </div>
          <button class="vote-btn ${hasVoted ? 'voted' : ''}" onclick="vote(event,'${track.id}')">
            <span class="vote-arrow">▲</span>
            <span class="vote-count">${track.votes || 0}</span>
          </button>
          <span class="chevron">⌄</span>
        </div>
        <div class="player-wrap" id="pw-${track.id}">
          ${playerContent}
        </div>
      </div>`;
  }).join('');
}

function escHtml(str) {
  return String(str||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── TOGGLE PLAYER ─────────────────────────────────────────────
function togglePlayer(id) {
  openId = openId === id ? null : id;
  renderChart();
}

// ── VOTE ──────────────────────────────────────────────────────
async function vote(e, id) {
  e.stopPropagation();
  if (!tracks[id]) return;

  const wasVoted = myVotes[id];
  const current = tracks[id].votes || 0;
  const newVotes = wasVoted ? current - 1 : current + 1;

  // Optimistic update
  tracks[id].votes = newVotes;
  if (wasVoted) delete myVotes[id];
  else myVotes[id] = 1;
  localStorage.setItem('cs40_votes', JSON.stringify(myVotes));
  renderChart();

  // Firebase update
  try {
    await fbUpdate(`tracks/${id}`, { votes: newVotes });
  } catch(err) {
    // Revert on fail
    tracks[id].votes = current;
    if (wasVoted) myVotes[id] = 1;
    else delete myVotes[id];
    localStorage.setItem('cs40_votes', JSON.stringify(myVotes));
    renderChart();
  }
}

// ── SUBMIT ────────────────────────────────────────────────────
async function submitTrack() {
  const artist = document.getElementById('inp-artist').value.trim();
  const title = document.getElementById('inp-title').value.trim();
  const url = document.getElementById('inp-url').value.trim();
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('form-msg');

  msg.className = 'form-msg';
  msg.style.display = 'none';

  if (!artist || !title || !url) {
    showMsg('error', '⚠️ Vul alle velden in!');
    return;
  }

  if (!url.startsWith('http')) {
    showMsg('error', '⚠️ Voer een geldige URL in (begint met https://)');
    return;
  }

  // Check duplicate URL
  const alreadyExists = Object.values(tracks).some(t => t.url === url);
  if (alreadyExists) {
    showMsg('error', '⚠️ Deze track staat al in de chart!');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Bezig...';

  try {
    const platform = detectPlatform(url);
    const newTrack = {
      artist,
      title,
      url,
      platform,
      votes: 0,
      submitted: Date.now()
    };

    const result = await fbPush('tracks', newTrack);
    const newId = result.name;

    tracks[newId] = newTrack;
    myTracks.push(newId);
    localStorage.setItem('cs40_mytracks', JSON.stringify(myTracks));

    document.getElementById('inp-artist').value = '';
    document.getElementById('inp-title').value = '';
    document.getElementById('inp-url').value = '';

    showMsg('success', `✅ "${title}" is toegevoegd aan de chart!`);
    renderChart();

  } catch(err) {
    showMsg('error', '❌ Er ging iets mis. Probeer opnieuw.');
  }

  btn.disabled = false;
  btn.textContent = '🚀 SUBMIT TRACK';
}

function showMsg(type, text) {
  const msg = document.getElementById('form-msg');
  msg.className = `form-msg ${type}`;
  msg.textContent = text;
  msg.style.display = 'block';
  setTimeout(() => { msg.style.display = 'none'; }, 4000);
}

// ── REALTIME POLLING (every 15s) ──────────────────────────────
setInterval(async () => {
  try {
    const data = await fbGet('tracks');
    if (data) {
      tracks = data;
      renderChart();
    }
  } catch(e) {}
}, 15000);

// ── INIT ──────────────────────────────────────────────────────
loadTracks();
</script>
</body>
</html>
