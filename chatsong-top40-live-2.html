<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatSong Top 40</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #ffffff;
    font-family: 'Open Sans', sans-serif;
    min-height: 100vh;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* HEADER */
  header {
    background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%);
    padding: 30px 16px 24px;
    text-align: center;
    border-bottom: 3px solid #ff6b00;
    margin-bottom: 24px;
  }

  .header-inner { max-width: 680px; margin: 0 auto; }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .flame { font-size: 32px; }

  h1 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 7vw, 48px);
    color: #ff6b00;
    letter-spacing: 2px;
    line-height: 1.1;
    text-transform: uppercase;
  }

  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: #ffffff;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
    opacity: 0.9;
  }

  .live-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: #ff6b00;
    border-radius: 20px;
    padding: 5px 16px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: #ffffff;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 12px;
  }

  .live-pill::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #fff;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* SUBMIT CARD */
  .submit-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .submit-heading {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: #1a1a2e;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  @media (max-width: 480px) {
    .form-grid { grid-template-columns: 1fr; }
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: #1a1a2e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input {
    background: #f4f4f8;
    border: 2px solid #ddd;
    border-radius: 8px;
    padding: 11px 14px;
    color: #1a1a2e;
    font-family: 'Open Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus { border-color: #ff6b00; background: #fff; }
  input::placeholder { color: #999; font-weight: 400; }

  .platforms {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .plat {
    padding: 3px 10px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Montserrat', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .plat-sc { background: #ff5500; color: #fff; }
  .plat-yt { background: #ff0000; color: #fff; }
  .plat-sp { background: #1db954; color: #fff; }
  .plat-bc { background: #1da0c3; color: #fff; }
  .plat-dz { background: #a238ff; color: #fff; }
  .plat-am { background: #fc3c44; color: #fff; }
  .plat-vm { background: #1ab7ea; color: #fff; }
  .plat-tw { background: #000000; color: #fff; }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: #ff6b00;
    border: none;
    border-radius: 10px;
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 16px;
  }

  .submit-btn:hover { background: #e55e00; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

  .form-msg {
    font-size: 13px;
    font-weight: 600;
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    display: none;
    font-family: 'Montserrat', sans-serif;
  }

  .form-msg.success { display: block; background: #d4f5e2; color: #1a7a3f; border: 1px solid #1db954; }
  .form-msg.error { display: block; background: #fde8e8; color: #c0392b; border: 1px solid #e74c3c; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 18px;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 2px;
    background: #ff6b00;
    opacity: 0.5;
  }

  /* LOADING */
  .loading {
    text-align: center;
    color: #ffffff;
    padding: 40px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(255,107,0,0.3);
    border-top-color: #ff6b00;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 50px 20px;
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
  }

  .empty-icon { font-size: 52px; margin-bottom: 14px; }
  .empty h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .empty p { font-size: 14px; opacity: 0.7; line-height: 1.6; }

  /* TRACK CARD */
  .track-card {
    background: #ffffff;
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    transition: transform 0.15s, box-shadow 0.15s;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .track-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.35); }
  .track-card.top1 { border-left: 5px solid #ffd700; }
  .track-card.top2 { border-left: 5px solid #c0c0c0; }
  .track-card.top3 { border-left: 5px solid #cd7f32; }

  .track-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
  }

  /* RANK */
  .rank {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 16px;
    min-width: 38px;
    height: 38px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .rank-1 { background: #ffd700; color: #5a3e00; }
  .rank-2 { background: #c0c0c0; color: #333; }
  .rank-3 { background: #cd7f32; color: #fff; }
  .rank-other { background: #1a1a2e; color: #ffffff; font-size: 14px; }

  /* TRACK INFO */
  .track-info { flex: 1; min-width: 0; }

  .track-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #1a1a2e;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
    font-size: 12px;
    color: #666;
    font-weight: 600;
    flex-wrap: wrap;
  }

  .pbadge {
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'Montserrat', sans-serif;
    text-transform: uppercase;
  }

  .pbadge-sc { background: #ff5500; color: #fff; }
  .pbadge-yt { background: #ff0000; color: #fff; }
  .pbadge-sp { background: #1db954; color: #fff; }
  .pbadge-bc { background: #1da0c3; color: #fff; }
  .pbadge-dz { background: #a238ff; color: #fff; }
  .pbadge-am { background: #fc3c44; color: #fff; }
  .pbadge-vm { background: #1ab7ea; color: #fff; }
  .pbadge-tw { background: #000000; color: #fff; }
  .pbadge-other { background: #1a1a2e; color: #fff; }

  /* VOTE */
  .vote-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    background: #f4f4f8;
    border: 2px solid #ddd;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    color: #666;
    transition: all 0.2s;
    flex-shrink: 0;
    min-width: 52px;
  }

  .vote-btn:hover:not(.voted) {
    border-color: #ff6b00;
    color: #ff6b00;
    background: #fff5ee;
  }

  .vote-btn.voted {
    border-color: #ff6b00;
    background: #ff6b00;
    color: #ffffff;
  }

  .vote-arrow { font-size: 16px; line-height: 1; }

  .vote-count {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 14px;
  }

  /* CHEVRON */
  .chevron {
    color: #999;
    font-size: 18px;
    transition: transform 0.3s;
    flex-shrink: 0;
  }

  .track-card.open .chevron { transform: rotate(180deg); }

  /* PLAYER */
  .player-wrap {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    background: #f8f8f8;
  }

  .track-card.open .player-wrap { max-height: 200px; }
  .player-wrap iframe { width: 100%; border: none; display: block; }

  .player-error {
    padding: 16px;
    text-align: center;
    font-size: 13px;
    color: #666;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
  }

  .player-error a { color: #ff6b00; text-decoration: none; }

  /* FOOTER */
  footer {
    text-align: center;
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,107,0,0.3);
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    letter-spacing: 1px;
  }

  footer span { color: #ff6b00; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-row">
      <span class="flame">🔥</span>
      <h1>ChatSong Top 40</h1>
      <span class="flame">🔥</span>
    </div>
    <p class="tagline">Indie Music Chart — Community Powered</p>
    <div class="live-pill">Live Voting</div>
  </div>
</header>

<div class="container">

  <!-- SUBMIT FORM -->
  <div class="submit-card">
    <div class="submit-heading">🎵 Submit Your Track</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Artist Name</label>
        <input type="text" id="inp-artist" placeholder="Your artist name..." maxlength="60">
      </div>
      <div class="form-group">
        <label>Track Title</label>
        <input type="text" id="inp-title" placeholder="Your track title..." maxlength="80">
      </div>
    </div>
    <div class="form-group full">
      <label>Music Link</label>
      <input type="url" id="inp-url" placeholder="https://soundcloud.com/... or youtube.com/... or spotify.com/...">
      <div class="platforms">
        <span class="plat plat-sc">☁ SoundCloud</span>
        <span class="plat plat-yt">▶ YouTube</span>
        <span class="plat plat-sp">♪ Spotify</span>
        <span class="plat plat-bc">🎵 Bandcamp</span>
        <span class="plat plat-dz">🎶 Deezer</span>
        <span class="plat plat-am">🍎 Apple Music</span>
        <span class="plat plat-vm">📹 Vimeo</span>
        <span class="plat plat-tw">🎵 Tidal</span>
      </div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitTrack()">🚀 Submit Track</button>
    <div class="form-msg" id="form-msg"></div>
  </div>

  <div class="section-title">🔥 Current Standings</div>

  <div id="chart">
    <div class="loading">
      <div class="spinner"></div>
      Loading chart...
    </div>
  </div>

  <footer>
    <p>ChatSong Top 40 · <span>community.chatsong.nl</span></p>
    <p style="margin-top:6px;opacity:0.5">Support indie music 🎵</p>
  </footer>
</div>

<script>
const DB_URL = 'https://chatsong-chart-top-40-default-rtdb.europe-west1.firebasedatabase.app';
let tracks = {};
let openId = null;
let myVotes = JSON.parse(localStorage.getItem('cs40_votes') || '{}');

function detectPlatform(url) {
  if (!url) return 'other';
  const u = url.toLowerCase();
  if (u.includes('soundcloud.com')) return 'soundcloud';
  if (u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
  if (u.includes('spotify.com')) return 'spotify';
  if (u.includes('bandcamp.com')) return 'bandcamp';
  if (u.includes('deezer.com')) return 'deezer';
  if (u.includes('music.apple.com')) return 'apple';
  if (u.includes('vimeo.com')) return 'vimeo';
  if (u.includes('tidal.com')) return 'tidal';
  return 'other';
}

function getEmbedUrl(url, platform) {
  try {
    if (platform === 'youtube') {
      let id = '';
      if (url.includes('youtu.be/')) id = url.split('youtu.be/')[1].split('?')[0];
      else if (url.includes('v=')) id = url.split('v=')[1].split('&')[0];
      return id ? `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1` : null;
    }
    if (platform === 'spotify') {
      const m = url.match(/spotify\.com\/(track|album|playlist|episode)\/([a-zA-Z0-9]+)/);
      return m ? `https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator` : null;
    }
    if (platform === 'soundcloud') {
      return `https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23ff6b00&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_teaser=false`;
    }
    if (platform === 'bandcamp') {
      // Bandcamp doesn't support easy embed by URL — link out
      return null;
    }
    if (platform === 'deezer') {
      const m = url.match(/deezer\.com\/[a-z]+\/(track|album|playlist)\/(\d+)/);
      return m ? `https://widget.deezer.com/widget/dark/${m[1]}/${m[2]}` : null;
    }
    if (platform === 'apple') {
      // Apple Music embed
      const embedUrl = url.replace('music.apple.com', 'embed.music.apple.com');
      return embedUrl;
    }
    if (platform === 'vimeo') {
      const m = url.match(/vimeo\.com\/(\d+)/);
      return m ? `https://player.vimeo.com/video/${m[1]}` : null;
    }
  } catch(e) {}
  return null;
}

function getHeight(platform) {
  if (platform === 'youtube') return 180;
  if (platform === 'spotify') return 152;
  if (platform === 'deezer') return 150;
  if (platform === 'apple') return 150;
  if (platform === 'vimeo') return 180;
  return 166;
}

function getPlatformBadge(platform) {
  const map = {
    soundcloud: `<span class="pbadge pbadge-sc">☁ SoundCloud</span>`,
    youtube:    `<span class="pbadge pbadge-yt">▶ YouTube</span>`,
    spotify:    `<span class="pbadge pbadge-sp">♪ Spotify</span>`,
    bandcamp:   `<span class="pbadge pbadge-bc">🎵 Bandcamp</span>`,
    deezer:     `<span class="pbadge pbadge-dz">🎶 Deezer</span>`,
    apple:      `<span class="pbadge pbadge-am">🍎 Apple Music</span>`,
    vimeo:      `<span class="pbadge pbadge-vm">📹 Vimeo</span>`,
    tidal:      `<span class="pbadge pbadge-tw">🎵 Tidal</span>`,
    other:      `<span class="pbadge pbadge-other">♫ Music</span>`
  };
  return map[platform] || map.other;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function fbGet(path) {
  const r = await fetch(`${DB_URL}/${path}.json`);
  return r.json();
}

async function fbPush(path, data) {
  const r = await fetch(`${DB_URL}/${path}.json`, { method:'POST', body: JSON.stringify(data) });
  return r.json();
}

async function fbUpdate(path, data) {
  await fetch(`${DB_URL}/${path}.json`, { method:'PATCH', body: JSON.stringify(data) });
}

async function loadTracks() {
  try {
    const data = await fbGet('tracks');
    tracks = data || {};
    renderChart();
  } catch(e) {
    document.getElementById('chart').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <h3>Connection failed</h3>
        <p>Check your internet connection and try again.</p>
      </div>`;
  }
}

function renderChart() {
  const chart = document.getElementById('chart');
  const sorted = Object.entries(tracks)
    .map(([id,t]) => ({id,...t}))
    .sort((a,b) => (b.votes||0)-(a.votes||0));

  if (!sorted.length) {
    chart.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🎵</div>
        <h3>No tracks yet!</h3>
        <p>Be the first to submit your track.<br>Share your music with the ChatSong community.</p>
      </div>`;
    return;
  }

  chart.innerHTML = sorted.map((t, i) => {
    const rank = i + 1;
    const rc = rank<=3 ? `top${rank}` : '';
    const rb = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'rank-other';
    const isOpen = openId === t.id;
    const voted = myVotes[t.id];
    const platform = t.platform || detectPlatform(t.url);
    const embedUrl = getEmbedUrl(t.url, platform);
    const h = getHeight(platform);

    const playerHtml = isOpen
      ? (embedUrl
          ? `<iframe src="${embedUrl}" height="${h}" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture" allowfullscreen scrolling="no"></iframe>`
          : `<div class="player-error">Player not available · <a href="${esc(t.url)}" target="_blank">Open on platform ↗</a></div>`)
      : '';

    return `
      <div class="track-card ${rc} ${isOpen?'open':''}" id="card-${t.id}">
        <div class="track-header" onclick="togglePlayer('${t.id}')">
          <div class="rank ${rb}">#${rank}</div>
          <div class="track-info">
            <div class="track-title">${esc(t.title)}</div>
            <div class="track-meta">
              <span>${esc(t.artist)}</span>·
              ${getPlatformBadge(platform)}
            </div>
          </div>
          <button class="vote-btn ${voted?'voted':''}" onclick="vote(event,'${t.id}')">
            <span class="vote-arrow">▲</span>
            <span class="vote-count">${t.votes||0}</span>
          </button>
          <span class="chevron">⌄</span>
        </div>
        <div class="player-wrap">${playerHtml}</div>
      </div>`;
  }).join('');
}

function togglePlayer(id) {
  openId = openId === id ? null : id;
  renderChart();
}

async function vote(e, id) {
  e.stopPropagation();
  if (!tracks[id]) return;
  const wasVoted = myVotes[id];
  const current = tracks[id].votes || 0;
  const newVotes = wasVoted ? current - 1 : current + 1;
  tracks[id].votes = newVotes;
  if (wasVoted) delete myVotes[id]; else myVotes[id] = 1;
  localStorage.setItem('cs40_votes', JSON.stringify(myVotes));
  renderChart();
  try { await fbUpdate(`tracks/${id}`, { votes: newVotes }); } catch(e) {}
}

async function submitTrack() {
  const artist = document.getElementById('inp-artist').value.trim();
  const title = document.getElementById('inp-title').value.trim();
  const url = document.getElementById('inp-url').value.trim();
  const btn = document.getElementById('submit-btn');

  if (!artist || !title || !url) { showMsg('error','⚠️ Please fill in all fields!'); return; }
  if (!url.startsWith('http')) { showMsg('error','⚠️ Please enter a valid URL starting with https://'); return; }
  if (Object.values(tracks).some(t => t.url === url)) { showMsg('error','⚠️ This track is already in the chart!'); return; }

  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const platform = detectPlatform(url);
    const result = await fbPush('tracks', { artist, title, url, platform, votes: 0, submitted: Date.now() });
    tracks[result.name] = { artist, title, url, platform, votes: 0 };
    document.getElementById('inp-artist').value = '';
    document.getElementById('inp-title').value = '';
    document.getElementById('inp-url').value = '';
    showMsg('success', `✅ "${title}" has been added to the chart!`);
    renderChart();
  } catch(e) {
    showMsg('error','❌ Something went wrong. Please try again.');
  }

  btn.disabled = false;
  btn.textContent = '🚀 Submit Track';
}

function showMsg(type, text) {
  const m = document.getElementById('form-msg');
  m.className = `form-msg ${type}`;
  m.textContent = text;
  setTimeout(() => { m.style.display='none'; }, 4000);
}

setInterval(async () => {
  try {
    const data = await fbGet('tracks');
    if (data) { tracks = data; renderChart(); }
  } catch(e) {}
}, 15000);

loadTracks();
</script>
</body>
</html>
