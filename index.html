
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatSong Top 40</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* Jouw CSS - Ongewijzigd en werkend */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #ffffff; font-family: 'Open Sans', sans-serif; min-height: 100vh; }
  .container { max-width: 680px; margin: 0 auto; padding: 0 12px 60px; }
  header { background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); padding: 16px 12px 12px; text-align: center; border-bottom: 3px solid #ff6b00; margin-bottom: 16px; }
  .logo-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
  .flame { font-size: 24px; }
  h1 { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: clamp(22px, 5.5vw, 48px); color: #ff6b00; letter-spacing: 1px; line-height: 1.1; text-transform: uppercase; }
  .tagline { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 10px; color: #ffffff; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; opacity: 0.9; }
  .live-pill { display: inline-flex; align-items: center; gap: 5px; background: #ff6b00; border-radius: 20px; padding: 3px 10px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 10px; color: #ffffff; text-transform: uppercase; margin-top: 6px; }
  .live-pill::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #fff; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .submit-card { background: #ffffff; border-radius: 10px; padding: 14px; margin-bottom: 18px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
  .submit-heading { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 14px; color: #1a1a2e; margin-bottom: 12px; }
  .form-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 8px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  label { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 10px; color: #1a1a2e; text-transform: uppercase; }
  input { background: #f4f4f8; border: 2px solid #ddd; border-radius: 6px; padding: 8px 10px; color: #1a1a2e; font-size: 12px; width: 100%; outline: none; }
  input:focus { border-color: #ff6b00; }
  .platforms { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
  .plat { padding: 2px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; font-family: 'Montserrat', sans-serif; text-transform: uppercase; }
  .plat-sc { background: #ff5500; color: #fff; } .plat-yt { background: #ff0000; color: #fff; } .plat-sp { background: #1db954; color: #fff; } .plat-bc { background: #1da0c3; color: #fff; } .plat-dz { background: #a238ff; color: #fff; } .plat-am { background: #fc3c44; color: #fff; } .plat-vm { background: #1ab7ea; color: #fff; } .plat-tw { background: #000000; color: #fff; }
  .submit-btn { width: 100%; padding: 10px; background: #ff6b00; border: none; border-radius: 6px; color: #ffffff; font-family: 'Montserrat', sans-serif; font-weight: 800; text-transform: uppercase; cursor: pointer; }
  .submit-btn:disabled { background: #aaa; }
  .form-msg { font-size: 11px; font-weight: 600; margin-top: 8px; padding: 7px 10px; border-radius: 5px; display: none; font-family: 'Montserrat', sans-serif; }
  .form-msg.success { display: block; background: #d4f5e2; color: #1a7a3f; border: 1px solid #1db954; }
  .form-msg.error { display: block; background: #fde8e8; color: #c0392b; border: 1px solid #e74c3c; }
  .section-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 12px; color: #ffffff; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 2px; background: #ff6b00; opacity: 0.5; }
  .track-card { background: #ffffff; border-radius: 8px; margin-bottom: 6px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .track-header { display: flex; align-items: flex-start; gap: 8px; padding: 10px; cursor: pointer; }
  .rank { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 12px; min-width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: #1a1a2e; color: #ffffff; }
  .track-info { flex: 1; min-width: 0; }
  .track-title { font-weight: 700; font-size: 12px; color: #1a1a2e; }
  .track-artist { font-size: 11px; color: #666; }
  .buttons-row { display: flex; gap: 6px; margin-top: 5px; }
  .vote-btn { background: #f4f4f8; border: 2px solid #ddd; border-radius: 6px; padding: 5px 8px; cursor: pointer; color: #666; font-size: 11px; }
  .vote-btn.voted { border-color: #ff6b00; background: #ff6b00; color: #fff; }
  .delete-btn { background: #f44336; border: none; border-radius: 6px; padding: 5px 8px; color: #fff; cursor: pointer; font-size: 11px; }
  .player-wrap { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; background: #f8f8f8; }
  .track-card.open .player-wrap { max-height: 280px; }
  .player-wrap iframe { width: 100%; border: none; display: block; }
  .submitter-info { padding: 6px 10px; font-size: 10px; color: #999; border-top: 1px solid #f0f0f0; }
</style>
</head>
<body>

<header>
  <div class="logo-row"><span class="flame">🔥</span><h1>ChatSong</h1><span class="flame">🔥</span></div>
  <p class="tagline">Top 40 Chart</p>
  <div class="live-pill">Live</div>
</header>

<div class="container">
  <div class="submit-card">
    <div class="submit-heading">🎵 Submit Track</div>
    <div class="form-grid">
      <div class="form-group"><label>Artist</label><input type="text" id="inp-artist" placeholder="Artist name"></div>
      <div class="form-group"><label>Title</label><input type="text" id="inp-title" placeholder="Track title"></div>
      <div class="form-group"><label>Your Name</label><input type="text" id="inp-name" placeholder="Display name"></div>
      <div class="form-group"><label>Link</label><input type="url" id="inp-url" placeholder="https://..."></div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitTrack()">🚀 Submit</button>
    <div class="form-msg" id="form-msg"></div>
  </div>

  <div class="section-title">🔥 Chart</div>
  <div id="chart"></div>
</div>

<script>
const DB_URL = 'https://chatsong-chart-top-40-default-rtdb.europe-west1.firebasedatabase.app';
let tracks = {};
let openId = null;
let myVotes = JSON.parse(localStorage.getItem('cs40_votes') || '{}');

// --- DE FIX: SOUNDCLOUD URL RESOLVER ---
async function resolveSoundCloudUrl(url) {
  // Als het een korte link is, gebruik proxy om de echte URL te vinden
  if (url.includes('on.soundcloud') || url.includes('app.goo.gl')) {
    try {
      const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
      const data = await response.json();
      return data.url || url; // Retourneert de echte URL of fallback naar origineel
    } catch(e) { return url; }
  }
  return url;
}

function detectPlatform(url) {
  if (!url) return 'other';
  const u = url.toLowerCase();
  if (u.includes('soundcloud.com')) return 'soundcloud';
  if (u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
  if (u.includes('spotify.com')) return 'spotify';
  if (u.includes('bandcamp.com')) return 'bandcamp';
  if (u.includes('deezer.com')) return 'deezer';
  if (u.includes('music.apple.com')) return 'apple';
  if (u.includes('vimeo.com')) return 'vimeo';
  return 'other';
}

function getEmbedUrl(url, platform) {
  try {
    if (platform === 'youtube') {
      const id = url.includes('youtu.be/') ? url.split('youtu.be/')[1].split('?')[0] : (url.split('v=')[1] ? url.split('v=')[1].split('&')[0] : null);
      return id ? `https://www.youtube.com/embed/${id}` : null;
    }
    if (platform === 'soundcloud') {
      return `https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23ff6b00&auto_play=false`;
    }
    if (platform === 'spotify') return url.replace('open.spotify.com', 'open.spotify.com/embed');
    if (platform === 'deezer') {
      const m = url.match(/deezer\.com\/[a-z]+\/(track|album|playlist)\/(\d+)/);
      return m ? `https://widget.deezer.com/widget/dark/${m[1]}/${m[2]}` : null;
    }
    if (platform === 'apple') return url.replace('music.apple.com', 'embed.music.apple.com');
  } catch(e) {}
  return null;
}

async function submitTrack() {
  const btn = document.getElementById('submit-btn');
  const urlInp = document.getElementById('inp-url');
  let url = urlInp.value.trim();
  
  if (!url) { showMsg('error','⚠️ URL verplicht!'); return; }
  
  btn.disabled = true;
  btn.textContent = 'Resolving URL...'; // UX feedback

  // Pas de FIX toe
  if (detectPlatform(url) === 'soundcloud') {
    url = await resolveSoundCloudUrl(url);
  }

  const artist = document.getElementById('inp-artist').value.trim();
  const title = document.getElementById('inp-title').value.trim();
  const name = document.getElementById('inp-name').value.trim();
  const platform = detectPlatform(url);

  try {
    await fetch(`${DB_URL}/tracks.json`, { 
      method:'POST', 
      body: JSON.stringify({ artist, title, name: name || 'Anonymous', url, platform, votes: 0 }) 
    });
    location.reload();
  } catch(e) { showMsg('error','❌ Fout bij uploaden'); btn.disabled = false; btn.textContent = '🚀 Submit'; }
}

// REST VAN JE LOGICA (Renderen, Vote, etc.)
function renderChart() {
  const chart = document.getElementById('chart');
  const sorted = Object.entries(tracks).map(([id,t]) => ({id,...t})).sort((a,b) => (b.votes||0)-(a.votes||0));
  chart.innerHTML = sorted.map((t, i) => {
    const isOpen = openId === t.id;
    const embedUrl = getEmbedUrl(t.url, t.platform);
    return `
      <div class="track-card ${isOpen?'open':''}">
        <div class="track-header" onclick="togglePlayer('${t.id}')">
          <div class="rank">#${i+1}</div>
          <div class="track-info">
            <div class="track-title">${t.title}</div>
            <div class="track-artist">${t.artist}</div>
            <div class="buttons-row">
              <button class="vote-btn ${myVotes[t.id]?'voted':''}" onclick="vote(event,'${t.id}')">▲ ${t.votes||0}</button>
            </div>
          </div>
        </div>
        <div class="player-wrap">${isOpen && embedUrl ? `<iframe src="${embedUrl}" height="250"></iframe>` : ''}</div>
      </div>`;
  }).join('');
}

function togglePlayer(id) { openId = openId === id ? null : id; renderChart(); }

async function vote(e, id) {
  e.stopPropagation();
  tracks[id].votes = (tracks[id].votes || 0) + 1;
  myVotes[id] = 1;
  localStorage.setItem('cs40_votes', JSON.stringify(myVotes));
  renderChart();
  await fetch(`${DB_URL}/tracks/${id}.json`, { method:'PATCH', body: JSON.stringify({votes: tracks[id].votes}) });
}

async function loadTracks() {
  const r = await fetch(`${DB_URL}/tracks.json`);
  tracks = await r.json() || {};
  renderChart();
}

function showMsg(type, text) {
  const m = document.getElementById('form-msg');
  m.className = `form-msg ${type}`;
  m.textContent = text;
  setTimeout(() => { m.style.display='none'; }, 3000);
}

loadTracks();
</script>
</body>
</html>
