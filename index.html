<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatSong Top 40</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #ffffff; font-family: 'Open Sans', sans-serif; min-height: 100vh; }
  .container { max-width: 680px; margin: 0 auto; padding: 0 12px 60px; }
  header { background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%); padding: 16px 12px 12px; text-align: center; border-bottom: 3px solid #ff6b00; margin-bottom: 16px; }
  .logo-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
  .flame { font-size: 24px; }
  h1 { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: clamp(22px, 5.5vw, 48px); color: #ff6b00; letter-spacing: 1px; line-height: 1.1; text-transform: uppercase; }
  .tagline { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 10px; color: #ffffff; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; opacity: 0.9; }
  .submit-card { background: #ffffff; border-radius: 10px; padding: 14px; margin-bottom: 18px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); color: #1a1a2e; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  label { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 10px; text-transform: uppercase; }
  input { background: #f4f4f8; border: 2px solid #ddd; border-radius: 6px; padding: 8px 10px; width: 100%; font-size: 12px; }
  .platforms { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
  .plat { padding: 2px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; text-transform: uppercase; color: #fff; }
  .plat-sc { background: #ff5500; } .plat-yt { background: #ff0000; } .plat-sp { background: #1db954; } 
  .submit-btn { width: 100%; padding: 10px; background: #ff6b00; border: none; border-radius: 6px; color: #ffffff; font-family: 'Montserrat', sans-serif; font-weight: 800; text-transform: uppercase; cursor: pointer; }
  .track-card { background: #ffffff; border-radius: 8px; margin-bottom: 8px; overflow: hidden; color: #1a1a2e; }
  .track-header { display: flex; align-items: center; gap: 8px; padding: 12px 10px; cursor: pointer; }
  .rank { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 12px; min-width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: #1a1a2e; color: #fff; }
  .track-title { font-weight: 700; font-size: 13px; }
  .track-artist { font-size: 11px; color: #555; }
  .player-wrap { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; background: #f0f0f0; }
  .track-card.open .player-wrap { max-height: 350px; padding: 10px; }
  .player-wrap iframe { width: 100%; border: none; display: block; }
  .close-btn { width: 100%; padding: 8px; background: #333; color: #fff; border: none; border-radius: 4px; margin-top: 10px; cursor: pointer; font-size: 12px; }
  .delete-btn { background: #f44336; border: none; padding: 5px 8px; color: #fff; cursor: pointer; border-radius: 6px; font-size: 10px; }
</style>
</head>
<body>

<header>
  <div class="logo-row"><span class="flame">🔥</span><h1>ChatSong</h1><span class="flame">🔥</span></div>
  <p class="tagline">Top 40 Chart</p>
</header>

<div class="container">
  <div class="submit-card">
    <div class="form-grid">
      <div class="form-group"><label>Artist</label><input type="text" id="inp-artist" placeholder="Artist"></div>
      <div class="form-group"><label>Title</label><input type="text" id="inp-title" placeholder="Title"></div>
      <div class="form-group"><label>Name</label><input type="text" id="inp-name" placeholder="Your name"></div>
      <div class="form-group"><label>Link</label><input type="url" id="inp-url" placeholder="https://..."></div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitTrack()">🚀 Submit</button>
  </div>
  <div id="chart"></div>
</div>

<script>
const DB_URL = 'https://chatsong-chart-top-40-default-rtdb.europe-west1.firebasedatabase.app';
let tracks = {};
let openId = null;

async function resolveSoundCloudUrl(url) {
  if (!url.includes('on.soundcloud') && !url.includes('app.goo.gl')) return url;
  try {
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent('https://soundcloud.com/oembed?url=' + encodeURIComponent(url) + '&format=json')}`;
    const r = await fetch(proxy);
    const data = await r.json();
    const json = JSON.parse(data.contents);
    const match = json.html.match(/url=([^&"'\s]+)/);
    return match ? decodeURIComponent(match[1]) : url;
  } catch(e) { return url; }
}

function detectPlatform(url) {
  const u = url.toLowerCase();
  if (u.includes('soundcloud.com') || u.includes('soundcloud.app.goo.gl') || u.includes('on.soundcloud.com')) return 'soundcloud';
  if (u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
  if (u.includes('spotify.com')) return 'spotify';
  if (u.includes('mixcloud.com')) return 'mixcloud';
  if (u.includes('bandcamp.com')) return 'bandcamp';
  if (u.includes('deezer.com')) return 'deezer';
  if (u.includes('music.apple.com')) return 'apple';
  if (u.includes('vimeo.com')) return 'vimeo';
  if (u.includes('tidal.com')) return 'tidal';
  return 'other';
}

function getEmbedUrl(url, platform) {
  try {
    if (platform === 'youtube') {
      const id = url.includes('youtu.be/') ? url.split('youtu.be/')[1].split('?')[0] : url.split('v=')[1]?.split('&')[0];
      return id ? `https://www.youtube.com/embed/${id}?autoplay=1` : null;
    }
    if (platform === 'soundcloud') {
      return `https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23ff6b00&auto_play=true`;
    }
    if (platform === 'spotify') {
      const m = url.match(/spotify\.com\/(track|album|playlist|episode)\/([a-zA-Z0-9]+)/);
      return m ? `https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator` : null;
    }
    if (platform === 'mixcloud') {
      const parts = url.split('mixcloud.com');
      if (parts[1]) return `https://www.mixcloud.com/widget/iframe/?feed=${encodeURIComponent(parts[1].split('?')[0])}&autoplay=1`;
    }
    if (platform === 'deezer') {
      const m = url.match(/deezer\.com\/[a-z]*\/?(track|album|playlist)\/(\d+)/);
      return m ? `https://widget.deezer.com/widget/dark/${m[1]}/${m[2]}?autoplay=true` : null;
    }
    if (platform === 'apple') return url.replace('music.apple.com', 'embed.music.apple.com');
    if (platform === 'vimeo') {
      const m = url.match(/vimeo\.com\/(\d+)/);
      return m ? `https://player.vimeo.com/video/${m[1]}?autoplay=1` : null;
    }
  } catch(e) {}
  return null;
}

async function renderChart() {
  const chart = document.getElementById('chart');
  const sorted = Object.entries(tracks).map(([id,t]) => ({id,...t})).sort((a,b) => (b.votes||0)-(a.votes||0));
  chart.innerHTML = sorted.map((t, i) => {
    const isOpen = openId === t.id;
    const embedUrl = getEmbedUrl(t.url, t.platform);
    return `
      <div class="track-card ${isOpen?'open':''}" id="card-${t.id}">
        <div class="track-header" onclick="togglePlayer('${t.id}')">
          <div class="rank">#${i+1}</div>
          <div style="flex:1">
            <div class="track-title">${t.title}</div>
            <div class="track-artist">${t.artist}</div>
          </div>
          <button class="delete-btn" onclick="event.stopPropagation(); deleteTrack('${t.id}')">✕</button>
        </div>
        <div class="player-wrap">
          ${isOpen && embedUrl ? `
            <iframe src="${embedUrl}" height="250" allow="autoplay; encrypted-media"></iframe>
            <button class="close-btn" onclick="togglePlayer('${t.id}')">Close Player ✕</button>
          ` : (isOpen ? `<p style="padding:10px; font-size:12px;">Link niet embedbaar. <a href="${t.url}" target="_blank">Open in nieuw venster</a></p><button class="close-btn" onclick="togglePlayer('${t.id}')">Close Player ✕</button>` : '')}
        </div>
      </div>`;
  }).join('');
}

function togglePlayer(id) { openId = (openId === id) ? null : id; renderChart(); }

async function submitTrack() {
  let url = document.getElementById('inp-url').value.trim();
  let platform = detectPlatform(url);
  if (platform === 'soundcloud') { url = await resolveSoundCloudUrl(url); }
  
  const data = { 
    artist: document.getElementById('inp-artist').value, 
    title: document.getElementById('inp-title').value, 
    name: document.getElementById('inp-name').value, 
    url, platform, votes: 0 
  };
  await fetch(`${DB_URL}/tracks.json`, { method:'POST', body: JSON.stringify(data) });
  location.reload();
}

async function deleteTrack(id) {
  await fetch(`${DB_URL}/tracks/${id}.json`, { method:'DELETE' });
  location.reload();
}

async function loadTracks() {
  const r = await fetch(`${DB_URL}/tracks.json`);
  tracks = await r.json() || {};
  renderChart();
}

loadTracks();
</script>
</body>
</html>
